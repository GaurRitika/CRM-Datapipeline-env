id: crm-data-pipeline
name: CRM Data Pipeline Agent
version: 1.0.0
description: |
  An environment simulating a CRM Data Engineer. The agent receives messy customer data from various sources (Web, Salesforce, Legacy DB) and must standardize, clean, and merge them into a pristine, analytics-ready pipeline table.
tags: ["etl", "data-engineering", "crm", "pandas"]
endpoints: {}
tasks:
  - id: t1
    description: "Task 1 (Easy): Normalize the single web_forms dataset. Fix date formats, lowercase emails, strip spaces."
    difficulty: easy
  - id: t2
    description: "Task 2 (Medium): Deduplicate the legacy_db dataset. Identify matching customers with messy info and merge them."
    difficulty: medium
  - id: t3
    description: "Task 3 (Hard): Resolve a 3-way merge conflict. Standardize and merge Salesforce, Web Leads, and Legacy DBs."
    difficulty: hard
